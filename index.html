<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buried Hunger</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <div class="brand">
        <h1 class="title">Buried Hunger</h1>
        <span id="game-version" class="version"></span>
      </div>
      <div class="resources">
        <div class="stat">
          <span class="stat-label">Meat</span>
          <span id="meat-display" class="stat-value meat">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Meat / sec</span>
          <span id="mps-display" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Lifetime Meat</span>
          <span id="total-display" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Bite power</span>
          <span id="click-display" class="stat-value">1</span>
        </div>
      </div>
      <div class="top-actions">
        <button type="button" id="btn-save" class="btn btn-outline">Save</button>
        <button type="button" id="btn-reset" class="btn btn-danger">Reset</button>
      </div>
    </header>

    <main class="main-grid">
      <aside class="panel panel-left">
        <h2 class="panel-heading">Body</h2>
        <p class="panel-note">Organs and traps that keep feeding on their own.</p>
        <div id="buildings-list" class="card-list"></div>
      </aside>

      <section class="center creature-chamber" aria-labelledby="creature-form-name">
        <div class="chamber-vignette" aria-hidden="true"></div>
        <div class="chamber-damp" aria-hidden="true"></div>

        <header class="chamber-header">
          <span class="chamber-kicker">Creature</span>
          <div class="chamber-title-row">
            <span id="creature-level" class="level-badge">LVL 1</span>
            <h2 id="creature-form-name" class="form-name">Larval Snare</h2>
          </div>
        </header>

        <div id="creature-stage" class="creature-stage">
          <!-- Sprite: one element, native aspect ratio, height-driven scale (see style.css) -->
          <div id="creature-visual" class="creature creature--1" role="img"></div>
        </div>

        <p class="feed-command-label">Command feed</p>
        <button type="button" id="btn-feed" class="feed-btn">
          <span id="feed-label" class="feed-label">Snatch Bug</span>
          <span id="feed-hint" class="feed-hint">+1 Meat per bite</span>
        </button>
        <p id="creature-flavor" class="whisper chamber-flavor"></p>

        <div class="chamber-stats" aria-label="Creature chamber readout">
          <div class="chamber-stat">
            <span class="chamber-stat-label">Meat</span>
            <span id="center-meat" class="chamber-stat-value meat">0</span>
          </div>
          <div class="chamber-stat">
            <span class="chamber-stat-label">Meat / sec</span>
            <span id="center-mps" class="chamber-stat-value">0</span>
          </div>
          <div class="chamber-stat">
            <span class="chamber-stat-label">Bite</span>
            <span id="center-click" class="chamber-stat-value">1</span>
          </div>
          <div class="chamber-stat">
            <span class="chamber-stat-label">Lifetime</span>
            <span id="center-total" class="chamber-stat-value">0</span>
          </div>
        </div>
      </section>

      <aside class="panel panel-right">
        <h2 class="panel-heading">Mutations</h2>
        <p class="panel-note">Permanent changes to how you bite and digest.</p>
        <div id="upgrades-list" class="card-list"></div>
      </aside>
    </main>

    <footer class="log-section">
      <h2 class="panel-heading log-heading">Burrow log</h2>
      <div id="event-log" class="event-log" role="log" aria-live="polite" aria-relevant="additions"></div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
